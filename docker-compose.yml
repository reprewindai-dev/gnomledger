services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: "sqlite:///./data/pgl.sqlite3"
      ALLOW_ANONYMOUS_IN_DEV: "True"
    volumes:
      - ./data:/app/data
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
